<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post New Item - EcoSwap</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">♻️ EcoSwap</a>
      <div class="nav-links" id="nav-links">
        <a href="items.html">Browse</a>
        <a href="item-form.html" class="active">Post Item</a>
        <a href="my-items.html">My Items</a>
        <a href="swaps.html">Swaps</a>
        <!-- <a href="profile.html">Profile</a> -->
        <a href="#" id="logout-btn">Logout</a>
      </div>
    </nav>
  </header>
  
  <main>
    <div class="form-container">
      <h1 id="form-title">Post New Item</h1>
      
      <div id="error-msg" class="alert alert-error" style="display: none;"></div>
      <div id="success-msg" class="alert alert-success" style="display: none;"></div>
      
      <form id="item-form">
        <div class="form-group">
          <label for="title">Title *</label>
          <input type="text" id="title" name="title" required maxlength="200" placeholder="e.g. Python Programming Book">
        </div>
        
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" maxlength="1000" placeholder="Describe the item, its condition, why you want to swap it..."></textarea>
        </div>
        
        <div class="form-group">
          <label for="category">Category *</label>
          <select id="category" name="category" required>
            <option value="">Select a category</option>
            <option value="electronics">Electronics</option>
            <option value="books">Books</option>
            <option value="clothing">Clothing</option>
            <option value="furniture">Furniture</option>
            <option value="sports">Sports</option>
            <option value="toys">Toys</option>
            <option value="kitchen">Kitchen</option>
            <option value="other">Other</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="condition">Condition *</label>
          <select id="condition" name="condition" required>
            <option value="">Select condition</option>
            <option value="new">New</option>
            <option value="like_new">Like New</option>
            <option value="good">Good</option>
            <option value="fair">Fair</option>
          </select>
        </div>
        
        <button type="submit" class="btn btn-primary" id="submit-btn">Post Item</button>
      </form>
    </div>
  </main>
  
  <script src="js/app.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const itemId = urlParams.get('id');
    const isEdit = Boolean(itemId);
    
    document.addEventListener('DOMContentLoaded', async () => {
      if (isEdit) {
        document.getElementById('form-title').textContent = 'Edit Item';
        document.getElementById('submit-btn').textContent = 'Update Item';
        await loadItem(itemId);
      }
    });
    
    async function loadItem(id) {
      try {
        const res = await fetch(`/api/items/${id}`);
        if (!res.ok) throw new Error('Item not found');
        const item = await res.json();
        
        document.getElementById('title').value = item.title;
        document.getElementById('description').value = item.description || '';
        document.getElementById('category').value = item.category;
        document.getElementById('condition').value = item.condition;
      } catch (err) {
        showError('Failed to load item');
      }
    }
    
    document.getElementById('item-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        category: document.getElementById('category').value,
        condition: document.getElementById('condition').value
      };
      
      try {
        const url = isEdit ? `/api/items/${itemId}` : '/api/items';
        const method = isEdit ? 'PUT' : 'POST';
        
        const res = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${getToken()}`
          },
          body: JSON.stringify(formData)
        });
        
        if (res.ok) {
          const data = await res.json();
          showSuccess(isEdit ? 'Item updated!' : 'Item posted!');
          setTimeout(() => {
            window.location.href = `item-detail.html?id=${isEdit ? itemId : data.id}`;
          }, 1000);
        } else {
          const data = await res.json();
          showError(data.error || 'Failed to save item');
        }
      } catch (err) {
        showError('Failed to save item');
      }
    });
    
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }
    
    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
