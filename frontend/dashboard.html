<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - 🌿 SwapIt</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .tabs { display:flex; gap:1rem; margin-bottom:1rem; border-bottom:1px solid var(--border); padding-bottom:0.5rem; }
    .tab { padding:0.5rem 1rem; cursor:pointer; border-radius:4px 4px 0 0; }
    .tab.active { background:var(--accent); color:white; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .swap-card { border:1px solid var(--border); padding:1rem; margin:0.5rem 0; border-radius:4px; }
    .swap-actions { margin-top:0.5rem; display:flex; gap:0.5rem; }
    .btn-accept { background:#2e7d32; color:white; border:none; padding:0.3rem 0.8rem; border-radius:4px; cursor:pointer; }
    .btn-decline { background:#c62828; color:white; border:none; padding:0.3rem 0.8rem; border-radius:4px; cursor:pointer; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">🌿 SwapIt</a>
      <div id="user-nav">
        <a href="/">Browse</a> | <a href="add-item.html">+ List Item</a> | <a href="#" id="logout">Logout</a>
      </div>
    </nav>
  </header>
  
  <main style="max-width:900px;margin:0 auto">
    <h2>My Dashboard</h2>
    <p id="welcome-msg"></p>
    
    <div class="tabs">
      <div class="tab active" data-tab="my-items">My Items</div>
      <div class="tab" data-tab="swap-requests">Swap Requests</div>
    </div>
    
    <div id="my-items" class="tab-content active">
      <p id="items-loading">Loading your items...</p>
      <div id="my-items-list" class="grid"></div>
      <a href="add-item.html" style="display:inline-block;margin-top:1rem;color:var(--accent)">+ Add new item</a>
    </div>
    
    <div id="swap-requests" class="tab-content">
      <p id="swaps-loading">Loading swap requests...</p>
      <div id="swaps-list"></div>
    </div>
  </main>
  
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Auth check
      try {
        const res = await fetch('/api/me', { credentials: 'include' });
        if (!res.ok) { window.location.href = 'login.html'; return; }
        const user = await res.json();
        document.getElementById('welcome-msg').textContent = `Welcome, ${user.email}`;
      } catch { window.location.href = 'login.html'; return; }
      
      // Tab switching
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(tab.dataset.tab).classList.add('active');
        });
      });
      
      // Load my items
      loadMyItems();
      // Load swap requests
      loadSwapRequests();
      
      // Logout
      document.getElementById('logout').addEventListener('click', async (e) => {
        e.preventDefault();
        await fetch('/api/logout', { method: 'POST', credentials: 'include' });
        window.location.href = '/';
      });
    });
    
    async function loadMyItems() {
      try {
        const res = await fetch('/api/items'); // In production: filter by user_id
        const items = await res.json();
        const list = document.getElementById('my-items-list');
        if (items.length === 0) {
          list.innerHTML = '<p>No items yet. <a href="add-item.html">List your first item</a>!</p>';
          return;
        }
        list.innerHTML = items.map(item => `
          <article class="card">
            <h3>${escapeHtml(item.title)}</h3>
            <p>${escapeHtml(item.category || '')}</p>
            <small>Status: ${item.status}</small>
            <div style="margin-top:0.5rem">
              <button onclick="editItem(${item.id})">Edit</button>
              <button onclick="deleteItem(${item.id})" style="background:#c62828;color:white;border:none;padding:0.3rem 0.6rem;border-radius:4px;cursor:pointer">Delete</button>
            </div>
          </article>
        `).join('');
      } catch {
        document.getElementById('my-items-list').innerHTML = '<p class="error">Failed to load items</p>';
      }
    }
    
    async function loadSwapRequests() {
      try {
        const res = await fetch('/api/swaps/received', { credentials: 'include' });
        const swaps = await res.json();
        const list = document.getElementById('swaps-list');
        if (swaps.length === 0) {
          list.innerHTML = '<p>No swap requests yet.</p>';
          return;
        }
        list.innerHTML = swaps.map(swap => `
          <div class="swap-card">
            <strong>${swap.proposer_email}</strong> wants to swap:
            <p>🎁 <em>${escapeHtml(swap.offered_item)}</em> ↔️ <em>${escapeHtml(swap.requested_item)}</em></p>
            <small>Requested: ${new Date(swap.created_at).toLocaleDateString()}</small>
            ${swap.status === 'pending' ? `
              <div class="swap-actions">
                <button class="btn-accept" onclick="respondSwap(${swap.id}, 'accepted')">✅ Accept</button>
                <button class="btn-decline" onclick="respondSwap(${swap.id}, 'declined')">❌ Decline</button>
              </div>
            ` : `<p><em>Status: ${swap.status}</em></p>`}
          </div>
        `).join('');
      } catch {
        document.getElementById('swaps-list').innerHTML = '<p class="error">Failed to load requests</p>';
      }
    }
    
    async function respondSwap(swapId, status) {
      try {
        const res = await fetch(`/api/swaps/${swapId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ status })
        });
        if (res.ok) {
          alert(`Swap ${status}!`);
          loadSwapRequests(); // Refresh
        } else {
          alert('Failed to respond to swap');
        }
      } catch { alert('Network error'); }
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
