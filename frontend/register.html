<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - EcoSwap</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo">♻️ EcoSwap</a>
      <div class="nav-links" id="nav-links"></div>
    </nav>
  </header>
  
  <main>
    <div class="form-container">
      <h1>Create Account</h1>
      <p style="color: var(--text-muted); margin-bottom: 2rem;">Join the swapping community</p>
      
      <div id="error-msg" class="alert alert-error" style="display: none;"></div>
      
      <form id="register-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required placeholder="Your full name">
        </div>
        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="6" placeholder="Minimum 6 characters">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
      </form>
      
      <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Already have an account? <a href="login.html">Login here</a>
      </p>
    </div>
  </main>
  
  <script src="js/app.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error-msg');
      
      errorDiv.style.display = 'none';
      
      const result = await register(name, email, password);
      
      if (result.success) {
        window.location.href = 'index.html';
      } else {
        errorDiv.textContent = result.error;
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
