<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Items - EcoSwap</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">♻️ EcoSwap</a>
      <div class="nav-links" id="nav-links">
        <a href="items.html" class="active">Browse</a>
        <a href="item-form.html">Post Item</a>
        <a href="my-items.html">My Items</a>
        <a href="swaps.html">Swaps</a>
        <a href="profile.html">Profile</a>
        <a href="#" id="logout-btn">Logout</a>
      </div>
    </nav>
  </header>
  
  <main>
    <div class="page-header">
      <h1>Browse Items</h1>
      <p>Find something you need — offer something you don't</p>
    </div>
    
    <div class="filters">
      <select id="category-filter">
        <option value="all">All Categories</option>
        <option value="electronics">Electronics</option>
        <option value="books">Books</option>
        <option value="clothing">Clothing</option>
        <option value="furniture">Furniture</option>
        <option value="sports">Sports</option>
        <option value="toys">Toys</option>
        <option value="kitchen">Kitchen</option>
        <option value="other">Other</option>
      </select>
    </div>
    
    <div id="items-grid" class="card-grid">
      <div class="loading">Loading items...</div>
    </div>
    
    <div id="pagination" class="pagination"></div>
  </main>
  
  <script src="js/app.js"></script>
  <script>
    let currentPage = 1;
    let currentCategory = 'all';
    
    document.addEventListener('DOMContentLoaded', async () => {
      await loadItems(1, 'all');
      
      document.getElementById('category-filter').addEventListener('change', (e) => {
        currentCategory = e.target.value;
        currentPage = 1;
        loadItems(1, currentCategory);
      });
    });
    
    async function loadItems(page, category) {
  const grid = document.getElementById('items-grid');
  const pagination = document.getElementById('pagination');
  
  try {
    const params = new URLSearchParams({ page });
    if (category !== 'all') params.append('category', category);
    
    const res = await fetch(`/api/items?${params}`);
    
    if (!res.ok) {
      throw new Error(`Failed to load items: ${res.status}`);
    }
    
    const data = await res.json();
    
    if (!data.items || data.items.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column: 1/-1; text-align: center; padding: 4rem 2rem;">
          <span style="font-size: 4rem; display: block; margin-bottom: 1rem;">📭</span>
          <p style="color: var(--text-muted);">No items found. Be the first to post one!</p>
        </div>
      `;
      pagination.innerHTML = '';
      return;
    }
    
      // Inside the map function for items
      grid.innerHTML = data.items.map(item => {
        const ownerName = item.owner?.name?.trim() || 'Unknown';
        const description = item.description?.trim() || 'No description';

        return `
          <article class=item-card">
            <h3><a href="item-detail.html?id=${item.id}">${escapeHtml(item.title)}</a></h3>
            <div class="badges">
              <span class="badge badge-category">${escapeHtml(item.category)}</span>
              <span class="badge badge-condition">${escapeHtml((item.condition || '').replace('_', ' '))}</span>
              <span class="badge badge-status-${item.status}">${escapeHtml(item.status)}</span>
            </div>
            <p>${escapeHtml(description)}</p>
            <p style="color: var(--text-muted); font-size: 0.875rem;">
              by ${escapeHtml(ownerName)}
            </p>
            <a href="item-detail.html?id=${item.id}" class="btn btn-primary btn-sm">View Details</a>
          </article>
        `;
      }).join('');
    
    // Pagination
    if (data.totalPages > 1) {
      pagination.innerHTML = `
        <button ${page <= 1 ? 'disabled' : ''} onclick="loadItems(${page - 1}, '${currentCategory}')">← Prev</button>
        <span style="padding: 6px 12px; font-size: 0.875rem;">Page ${page} of ${data.totalPages}</span>
        <button ${page >= data.totalPages ? 'disabled' : ''} onclick="loadItems(${page + 1}, '${currentCategory}')">Next →</button>
      `;
    } else {
      pagination.innerHTML = '';
    }
  } catch (err) {
    console.error('Load items error:', err);
    grid.innerHTML = '<div class="alert alert-error">Failed to load items. Please try again.</div>';
    pagination.innerHTML = '';
  }
}
    
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
