<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Item Detail - EcoSwap</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <nav>
        <a href="/" class="logo">♻️ EcoSwap</a>
        <div class="nav-links" id="nav-links">
          <a href="items.html">Browse</a>
          <a href="item-form.html">Post Item</a>
          <a href="my-items.html">My Items</a>
          <a href="swaps.html">Swaps</a>
          <a href="profile.html">Profile</a>
          <a href="#" id="logout-btn">Logout</a>
        </div>
      </nav>
    </header>

    <main>
      <div class="detail-page">
        <a href="items.html" class="back-link">← Back to items</a>

        <div id="item-detail">
          <div class="loading">Loading...</div>
        </div>
      </div>
    </main>

    <script src="js/app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const params = new URLSearchParams(window.location.search);
        const itemId = params.get("id");

        if (!itemId) {
          document.getElementById("item-detail").innerHTML =
            '<div class="alert alert-error">No item ID provided</div>';
          return;
        }

        await loadItemDetail(itemId);
      });

      async function loadItemDetail(itemId) {
        const container = document.getElementById("item-detail");
        const user = getUser();

        try {
          const res = await fetch(`/api/items/${itemId}`);
          if (!res.ok) throw new Error("Item not found");
          const item = await res.json();

          // ✅ CORRECT: Access nested owner object
          const ownerName = item.owner?.name || 'Unknown';
          const ownerCity = item.owner?.city || 'Unknown';
          const isOwner = user && user.id == item.owner?.id;

          let actionButtons = "";
          if (isOwner) {
            if (item.status === "available") {
              actionButtons = `
                <div class="action-buttons">
                  <a href="item-form.html?id=${item.id}" class="btn btn-secondary">Edit</a>
                  <button class="btn btn-danger" onclick="deleteItem('${item.id}')">Delete</button>
                </div>
              `;
            } else {
              actionButtons = `
                <div class="action-buttons">
                  <button class="btn btn-danger" onclick="deleteItem('${item.id}')">Delete</button>
                </div>
              `;
            }
          } else if (user && item.status === "available") {
            actionButtons = `
              <div class="action-buttons">
                <button class="btn btn-primary" onclick="openSwapModal('${item.id}')">🔄 Propose Swap</button>
              </div>
            `;
          }

          container.innerHTML = `
            <h1>${escapeHtml(item.title)}</h1>
            <div class="detail-meta">
              <span class="badge badge-category">${escapeHtml(item.category)}</span>
              <span class="badge badge-condition">${escapeHtml((item.condition || '').replace("_", " "))}</span>
              <span class="badge badge-status-${item.status}">${escapeHtml(item.status)}</span>
            </div>
            <p class="detail-description">${escapeHtml(item.description || "No description")}</p>
            <div class="detail-owner">
              <strong>Posted by:</strong> ${escapeHtml(ownerName)}${ownerCity !== 'Unknown' ? ` • ${escapeHtml(ownerCity)}` : ''}
            </div>
            ${actionButtons}
          `;
        } catch (err) {
          container.innerHTML = '<div class="alert alert-error">Item not found</div>';
        }
      }

      async function openSwapModal(requestedItemId) {
        const user = getUser();
        if (!user) {
          window.location.href = "login.html";
          return;
        }

        try {
          // 🔍 FIRST: Check if user owns the requested item (prevent self-swap)
          const itemRes = await fetch(`/api/items/${requestedItemId}`);
          const item = await itemRes.json();
          
          if (item.owner?.id === user.id) {
            alert('You cannot swap with yourself!');
            return;
          }

          // Fetch user's items
          const res = await fetch("/api/items/mine", {
            headers: { Authorization: `Bearer ${getToken()}` },
          });
          const myItems = await res.json();
          const available = myItems.filter((i) => i.status === "available");

          const modal = document.createElement("div");
          modal.className = "modal-overlay";
          modal.onclick = () => modal.remove();

          let content = "";
          if (available.length === 0) {
            content = `
              <p style="color: var(--text-muted); margin-bottom: 1.5rem; text-align: center;">
                You have no available items. <a href="item-form.html" style="color: var(--primary); font-weight: 600;">Post one first</a>.
              </p>
              <div class="modal-actions" style="justify-content: center;">
                <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Close</button>
              </div>
            `;
          } else {
            content = `
              <div id="swap-items">
                ${available.map((item) => `
                  <div class="modal-item" onclick="selectSwapItem(this, '${item.id}')">
                    <strong>${escapeHtml(item.title)}</strong>
                    <span class="badge badge-category" style="margin-left: 8px;">${escapeHtml(item.category)}</span>
                  </div>
                `).join("")}
              </div>
              <div class="modal-actions">
                <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                <button class="btn btn-primary" id="send-swap" disabled onclick="submitSwap('${requestedItemId}')">Send Swap Request</button>
              </div>
            `;
          }

          modal.innerHTML = `
            <div class="modal" onclick="event.stopPropagation()">
              <h2>Select an Item to Offer</h2>
              ${content}
            </div>
          `;

          document.body.appendChild(modal);
        } catch (err) {
          console.error('Error opening swap modal:', err);
          alert("Failed to load your items");
        }
      }

      function selectSwapItem(element, itemId) {
        document.querySelectorAll(".modal-item").forEach((el) => el.classList.remove("selected"));
        element.classList.add("selected");
        element.dataset.itemId = itemId;
        document.getElementById("send-swap").disabled = false;
      }

      async function submitSwap(requestedItemId) {
        const selectedItem = document.querySelector(".modal-item.selected");
        if (!selectedItem) return;

        const offeredItemId = selectedItem.dataset.itemId;

        try {
          // ✅ CORRECT: Send IDs as strings (no parseInt)
          const res = await fetch("/api/swaps", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${getToken()}`,
            },
            body: JSON.stringify({
              offeredItemId: offeredItemId,
              requestedItemId: requestedItemId,
            }),
          });

          if (res.ok) {
            const modal = document.querySelector(".modal-overlay");
            modal.innerHTML = `
              <div class="modal" onclick="event.stopPropagation()">
                <h2 style="color: var(--success); text-align: center; margin-bottom: 1rem;">✅ Success!</h2>
                <p style="text-align: center; color: var(--text-muted); margin-bottom: 1.5rem;">Swap request sent successfully.</p>
                <div class="modal-actions" style="justify-content: center;">
                  <button class="btn btn-primary" onclick="this.closest('.modal-overlay').remove()">Close</button>
                </div>
              </div>
            `;
          } else {
            const data = await res.json();
            alert(data.error || "Failed to send swap request");
          }
        } catch (err) {
          console.error('Error submitting swap:', err);
          alert("Failed to send swap request");
        }
      }

      async function deleteItem(itemId) {
        if (!confirm("Delete this item?")) return;

        try {
          const res = await fetch(`/api/items/${itemId}`, {
            method: "DELETE",
            headers: { Authorization: `Bearer ${getToken()}` },
          });

          if (res.ok) {
            window.location.href = "my-items.html";
          } else {
            const data = await res.json();
            alert(data.error || "Failed to delete item");
          }
        } catch (err) {
          console.error('Error deleting item:', err);
          alert("Failed to delete item");
        }
      }

      function escapeHtml(str) {
        if (!str) return "";
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }
    </script>
  </body>
</html>
