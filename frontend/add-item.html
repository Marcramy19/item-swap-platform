<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Item - 🌿 SwapIt</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">🌿 SwapIt</a>
      <div id="user-nav" style="display:none">
        <a href="/">Browse</a> | <a href="dashboard.html">Dashboard</a> | <a href="#" id="logout">Logout</a>
      </div>
    </nav>
  </header>
  
  <main class="hero">
    <h2>List an Item for Swap</h2>
    <form id="add-item-form" style="max-width:500px;margin:2rem auto;text-align:left">
      <label>Title*<br>
        <input type="text" name="title" required maxlength="100" 
               style="width:100%;padding:0.5rem;margin:0.5rem 0;border:1px solid var(--border);border-radius:4px">
      </label>
      <label>Description<br>
        <textarea name="description" rows="3" maxlength="500"
                  style="width:100%;padding:0.5rem;margin:0.5rem 0;border:1px solid var(--border);border-radius:4px"></textarea>
      </label>
      <label>Category<br>
        <select name="category" style="width:100%;padding:0.5rem;margin:0.5rem 0;border:1px solid var(--border);border-radius:4px">
          <option value="">Select...</option>
          <option>Electronics</option><option>Clothing</option><option>Books</option>
          <option>Home</option><option>Sports</option><option>Other</option>
        </select>
      </label>
      <label>Image URL (optional)<br>
        <input type="url" name="image_url" placeholder="https://..." 
               style="width:100%;padding:0.5rem;margin:0.5rem 0;border:1px solid var(--border);border-radius:4px">
      </label>
      <button type="submit" 
              style="background:var(--accent);color:white;padding:0.75rem 1.5rem;border:none;border-radius:4px;cursor:pointer;margin-top:1rem">
        Publish Item
      </button>
      <p id="error" style="color:#c62828;margin-top:1rem"></p>
      <p id="success" style="color:var(--accent);margin-top:1rem;display:none">✅ Item published! <a href="/">View all</a></p>
    </form>
  </main>
  
  <script src="js/app.js"></script>
  <script>
    // Check auth before showing form
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch('/api/me', { credentials: 'include' });
        if (!res.ok) {
          window.location.href = 'login.html?redirect=add-item.html';
          return;
        }
        document.getElementById('user-nav').style.display = 'block';
      } catch { window.location.href = 'login.html'; }
    });
    
    document.getElementById('add-item-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const error = document.getElementById('error');
      const success = document.getElementById('success');
      error.textContent = ''; success.style.display = 'none';
      
      const data = Object.fromEntries(new FormData(form));
      
      try {
        const res = await fetch('/api/items', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (res.ok) {
          success.style.display = 'block';
          form.reset();
        } else {
          error.textContent = result.error || 'Failed to publish item';
        }
      } catch {
        error.textContent = 'Network error';
      }
    });
    
    document.getElementById('logout')?.addEventListener('click', async (e) => {
      e.preventDefault();
      await fetch('/api/logout', { method: 'POST', credentials: 'include' });
      window.location.href = '/';
    });
  </script>
</body>
</html>
