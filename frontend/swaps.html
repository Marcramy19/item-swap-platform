<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Swaps - EcoSwap</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .tabs {
      display: flex;
      gap: 2rem;
      border-bottom: 2px solid var(--border);
      margin-bottom: 2rem;
    }
    .tab {
      padding: 0.75rem 0;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .swap-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }
    .swap-items {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
      margin-bottom: 1rem;
    }
    .swap-item {
      flex: 1;
      padding: 1rem;
      background: var(--bg);
      border-radius: var(--radius-sm);
      text-align: center;
    }
    .swap-item strong {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .swap-arrow {
      font-size: 1.5rem;
      color: var(--text-muted);
    }
    .swap-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 1rem;
    }
    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 1rem;
    }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-accepted { background: #dcfce7; color: #166534; }
    .status-rejected { background: #f3f4f6; color: #4b5563; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">♻️ EcoSwap</a>
      <div class="nav-links" id="nav-links">
        <a href="items.html">Browse</a>
        <a href="item-form.html">Post Item</a>
        <a href="my-items.html">My Items</a>
        <a href="swaps.html" class="active">Swaps</a>
        <a href="profile.html">Profile</a>
        <a href="#" id="logout-btn">Logout</a>
      </div>
    </nav>
  </header>
  
  <main>
    <div class="page-header">
      <h1>My Swaps</h1>
      <p>Manage your swap requests</p>
    </div>
    
    <div class="tabs">
      <div class="tab active" data-tab="received" onclick="switchTab('received')">Received</div>
      <div class="tab" data-tab="sent" onclick="switchTab('sent')">Sent</div>
    </div>
    
    <div id="received-tab" class="tab-content active">
      <div id="received-swaps" class="loading">Loading...</div>
    </div>
    
    <div id="sent-tab" class="tab-content">
      <div id="sent-swaps" class="loading">Loading...</div>
    </div>
  </main>
  
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await loadSwaps();
    });
    
    async function loadSwaps() {
      const receivedContainer = document.getElementById('received-swaps');
      const sentContainer = document.getElementById('sent-swaps');
      
      try {
        const token = getToken();
        const res = await fetch('/api/swaps/mine', {
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          }
        });
        
        if (res.status === 401) {
          window.location.href = 'login.html';
          return;
        }
        
        if (!res.ok) {
          throw new Error(`Failed to load swaps: ${res.status}`);
        }
        
        // ✅ API returns: { sent: [...], received: [...] }
        const data = await res.json();
        
        console.log('Swaps loaded:', {
          sent: data.sent?.length || 0,
          received: data.received?.length || 0
        });
        
        // ✅ Render received swaps (requests others sent to you)
        renderSwaps(receivedContainer, data.received || [], 'received');
        
        // ✅ Render sent swaps (requests you sent to others)
        renderSwaps(sentContainer, data.sent || [], 'sent');
        
      } catch (err) {
        console.error('Error loading swaps:', err);
        receivedContainer.innerHTML = '<div class="alert alert-error">Failed to load swaps. Please try again.</div>';
        sentContainer.innerHTML = '<div class="alert alert-error">Failed to load swaps. Please try again.</div>';
      }
    }
    
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      document.getElementById(`${tab}-tab`).classList.add('active');
    }
    
    function renderSwaps(container, swaps, type) {
      if (!container) return;
      
      if (!swaps || swaps.length === 0) {
        container.innerHTML = `
          <div class="empty-state" style="text-align: center; padding: 4rem 2rem;">
            <span style="font-size: 4rem; display: block; margin-bottom: 1rem;">🔄</span>
            <p style="color: var(--text-muted);">
              ${type === 'received' ? 'No received swap requests yet.' : 'You haven\'t sent any swap requests yet.'}
            </p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = swaps.map(swap => {
        // ✅ Extract data from nested objects (Prisma response structure)
        const offered = swap.offeredItem || {};
        const requested = swap.requestedItem || {};
        const offeredOwner = offered.owner || {};
        const requestedOwner = requested.owner || {};
        
        const isPending = swap.status === 'pending';
        const canRespond = type === 'received' && isPending;
        
        return `
          <div class="swap-card">
            <div class="swap-items">
              <div class="swap-item">
                <strong>${escapeHtml(offered.title || 'Unknown item')}</strong>
                <span class="badge badge-category">${escapeHtml(offered.category || '')}</span>
                <p style="font-size: 0.875rem; color: var(--text-muted); margin-top: 0.5rem;">
                  ${type === 'sent' ? 'Your item' : `by ${escapeHtml(offeredOwner.name || 'User')}`}
                </p>
              </div>
              <div class="swap-arrow">⇄</div>
              <div class="swap-item">
                <strong>${escapeHtml(requested.title || 'Unknown item')}</strong>
                <span class="badge badge-category">${escapeHtml(requested.category || '')}</span>
                <p style="font-size: 0.875rem; color: var(--text-muted); margin-top: 0.5rem;">
                  ${type === 'received' ? 'Your item' : `by ${escapeHtml(requestedOwner.name || 'User')}`}
                </p>
              </div>
            </div>
            
            <span class="status-badge status-${swap.status}">${swap.status}</span>
            
            ${canRespond ? `
              <div class="swap-actions">
                <button class="btn btn-primary btn-sm" onclick="respondSwap('${swap.id}', 'accepted')">Accept</button>
                <button class="btn btn-danger btn-sm" onclick="respondSwap('${swap.id}', 'rejected')">Reject</button>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }
    
    async function respondSwap(swapId, status) {
      if (!confirm(`Are you sure you want to ${status} this swap?`)) return;
      
      try {
        const token = getToken();
        const res = await fetch(`/api/swaps/${swapId}`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ status })
        });
        
        if (res.ok) {
          await loadSwaps(); // Refresh the list
        } else {
          const data = await res.json();
          alert(data.error || `Failed to ${status} swap`);
        }
      } catch (err) {
        console.error('Error responding to swap:', err);
        alert('Failed to respond to swap. Please try again.');
      }
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
