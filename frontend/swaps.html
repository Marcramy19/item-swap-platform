<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Swaps - EcoSwap</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .tabs {
      display: flex;
      gap: 2rem;
      border-bottom: 2px solid var(--border);
      margin-bottom: 2rem;
    }
    .tab {
      padding: 0.75rem 0;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .tab:hover {
      color: var(--text);
    }
    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .swap-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }
    .swap-items {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
      margin-bottom: 1rem;
    }
    .swap-item {
      flex: 1;
      padding: 1rem;
      background: var(--bg);
      border-radius: var(--radius-sm);
      text-align: center;
    }
    .swap-item strong {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .swap-arrow {
      font-size: 1.5rem;
      color: var(--text-muted);
    }
    .swap-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 1rem;
    }
    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 1rem;
    }
    .status-pending {
      background: #fef3c7;
      color: #92400e;
    }
    .status-accepted {
      background: #dcfce7;
      color: #166534;
    }
    .status-rejected {
      background: #f3f4f6;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">♻️ EcoSwap</a>
      <div class="nav-links" id="nav-links">
        <a href="items.html">Browse</a>
        <a href="item-form.html">Post Item</a>
        <a href="my-items.html">My Items</a>
        <a href="swaps.html" class="active">Swaps</a>
        <a href="profile.html">Profile</a>
        <a href="#" id="logout-btn">Logout</a>
      </div>
    </nav>
  </header>
  
  <main>
    <div class="page-header">
      <h1>My Swaps</h1>
      <p>Manage your swap requests</p>
    </div>
    
    <div class="tabs">
      <div class="tab active" data-tab="received" onclick="switchTab('received')">Received</div>
      <div class="tab" data-tab="sent" onclick="switchTab('sent')">Sent</div>
    </div>
    
    <div id="received-tab" class="tab-content active">
      <div id="received-swaps" class="loading">Loading...</div>
    </div>
    
    <div id="sent-tab" class="tab-content">
      <div id="sent-swaps" class="loading">Loading...</div>
    </div>
  </main>
  
  <script src="js/app.js"></script>
  <script>
    let allSwaps = [];
    
    document.addEventListener('DOMContentLoaded', async () => {
      await loadSwaps();
    });
    
    async function loadSwaps() {
      try {
        const res = await fetch('/api/swaps/mine', {
          headers: { 'Authorization': `Bearer ${getToken()}` }
        });
        
        if (!res.ok) {
          if (res.status === 401) {
            window.location.href = 'login.html';
            return;
          }
          throw new Error('Failed to load swaps');
        }
        
        allSwaps = await res.json();
        renderSwaps();
      } catch (err) {
        document.getElementById('received-swaps').innerHTML = '<div class="alert alert-error">Failed to load swaps</div>';
        document.getElementById('sent-swaps').innerHTML = '<div class="alert alert-error">Failed to load swaps</div>';
      }
    }
    
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      document.getElementById(`${tab}-tab`).classList.add('active');
    }
    
    function renderSwaps() {
      const user = getUser();
      
      // Filter received swaps (where user owns the requested item)
      const received = allSwaps.filter(swap => {
        // Check if this swap is for an item owned by the current user
        return swap.requested_owner_id == user.id;
      });
      
      // Filter sent swaps (where user is the requester)
      const sent = allSwaps.filter(swap => {
        return swap.requester_name === user.name;
      });
      
      renderReceivedSwaps(received);
      renderSentSwaps(sent);
    }
    
    function renderReceivedSwaps(swaps) {
      const container = document.getElementById('received-swaps');
      
      if (swaps.length === 0) {
        container.innerHTML = `
          <div class="empty-state" style="text-align: center; padding: 4rem 2rem;">
            <span style="font-size: 4rem; display: block; margin-bottom: 1rem;">🔄</span>
            <p style="color: var(--text-muted);">No received swap requests yet.</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = swaps.map(swap => `
        <div class="swap-card">
          <div class="swap-items">
            <div class="swap-item">
              <strong>${escapeHtml(swap.offered_title)}</strong>
              <span class="badge badge-category">${escapeHtml(swap.offered_cat)}</span>
              <p style="font-size: 0.875rem; color: var(--text-muted); margin-top: 0.5rem;">by ${escapeHtml(swap.requester_name)}</p>
            </div>
            <div class="swap-arrow">⇄</div>
            <div class="swap-item">
              <strong>${escapeHtml(swap.requested_title)}</strong>
              <span class="badge badge-category">${escapeHtml(swap.requested_cat)}</span>
              <p style="font-size: 0.875rem; color: var(--text-muted); margin-top: 0.5rem;">Your item</p>
            </div>
          </div>
          <span class="status-badge status-${swap.status}">${swap.status}</span>
          ${swap.status === 'pending' ? `
            <div class="swap-actions">
              <button class="btn btn-primary btn-sm" onclick="respondSwap(${swap.id}, 'accepted')">Accept</button>
              <button class="btn btn-danger btn-sm" onclick="respondSwap(${swap.id}, 'rejected')">Reject</button>
            </div>
          ` : ''}
        </div>
      `).join('');
    }
    
    function renderSentSwaps(swaps) {
      const container = document.getElementById('sent-swaps');
      
      if (swaps.length === 0) {
        container.innerHTML = `
          <div class="empty-state" style="text-align: center; padding: 4rem 2rem;">
            <span style="font-size: 4rem; display: block; margin-bottom: 1rem;">🔄</span>
            <p style="color: var(--text-muted);">You haven't sent any swap requests yet.</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = swaps.map(swap => `
        <div class="swap-card">
          <div class="swap-items">
            <div class="swap-item">
              <strong>${escapeHtml(swap.offered_title)}</strong>
              <span class="badge badge-category">${escapeHtml(swap.offered_cat)}</span>
              <p style="font-size: 0.875rem; color: var(--text-muted); margin-top: 0.5rem;">Your item</p>
            </div>
            <div class="swap-arrow">⇄</div>
            <div class="swap-item">
              <strong>${escapeHtml(swap.requested_title)}</strong>
              <span class="badge badge-category">${escapeHtml(swap.requested_cat)}</span>
              <p style="font-size: 0.875rem; color: var(--text-muted); margin-top: 0.5rem;">by ${escapeHtml(swap.owner_name)}</p>
            </div>
          </div>
          <span class="status-badge status-${swap.status}">${swap.status}</span>
        </div>
      `).join('');
    }
    
    async function respondSwap(swapId, status) {
      if (!confirm(`Are you sure you want to ${status} this swap?`)) return;
      
      try {
        const res = await fetch(`/api/swaps/${swapId}`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${getToken()}`
          },
          body: JSON.stringify({ status })
        });
        
        if (res.ok) {
          await loadSwaps();
        } else {
          const data = await res.json();
          alert(data.error || 'Failed to respond to swap');
        }
      } catch (err) {
        alert('Failed to respond to swap');
      }
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
